name: Lint, Build and test

on:
  push: 
    branches:
     - main 

  pull_request:
    branches:
     - main 

  workflow_dispatch:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y make

          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

          go install github.com/yoheimuta/protolint/cmd/protolint@v0.53.0

          curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2

      - name: Run lint
        run: make lint

  build:
    name: build 
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install make
        run: |
          sudo apt-get update
          sudo apt-get install -y make

      - name: Run build
        run: make up

  test:
    name: test 
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install make
        run: |
          sudo apt-get update
          sudo apt-get install -y make

      - name: Run tests
        run: make tests

