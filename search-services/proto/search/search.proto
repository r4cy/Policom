syntax = "proto3";

package search;

import "google/protobuf/empty.proto";

option go_package = "yadro.com/course/proto/search";

message SearchRequest {
  int64 limit = 1;
  string phrase = 2;
}

message Comics {
  int64 id = 1;
  string title = 2;
  string url = 3;
  string description = 4;
  string imgdescription = 5;
}

message SearchReply {
  repeated Comics comics = 1;
  int64 total = 2;
}

message ComicsRequest {
  int64 id = 1;
}

service Search {
  rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty) {}

  rpc Search(SearchRequest) returns (SearchReply) {}

  rpc ISearch(SearchRequest) returns (SearchReply) {}

  rpc GetById(ComicsRequest) returns (Comics) {}
}