<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Профиль — Policom</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      background: #06050e;
      min-height: 100vh;
      color: rgba(232,228,255,0.82);
      overflow-x: hidden;
    }

    /* ── ORBS ── */
    .scene{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .orb{position:absolute;border-radius:50%;will-change:transform;animation:float linear infinite;}
    .o1{width:860px;height:860px;background:radial-gradient(circle at 38% 38%,rgba(76,29,149,.55) 0%,transparent 62%);top:-300px;left:-260px;animation-duration:34s;filter:blur(70px);}
    .o2{width:640px;height:640px;background:radial-gradient(circle at 60% 60%,rgba(14,78,153,.45) 0%,transparent 62%);bottom:-220px;right:-200px;animation-duration:27s;animation-delay:-10s;filter:blur(80px);}
    .o3{width:480px;height:480px;background:radial-gradient(circle at 50% 50%,rgba(109,40,217,.38) 0%,transparent 62%);top:42%;left:54%;animation-duration:21s;animation-delay:-16s;filter:blur(85px);}
    @keyframes float{0%,100%{transform:translate(0,0) scale(1);}25%{transform:translate(28px,-22px) scale(1.03);}50%{transform:translate(-20px,32px) scale(0.97);}75%{transform:translate(22px,12px) scale(1.02);}}

    /* ── HEADER ── */
    header{
      position:fixed;top:0;left:0;right:0;z-index:100;
      height:54px;
      display:flex;align-items:center;padding:0 24px;
      background:rgba(6,5,14,.65);
      backdrop-filter:blur(48px) saturate(180%);
      -webkit-backdrop-filter:blur(48px) saturate(180%);
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    header::after{
      content:'';
      position:absolute;bottom:-1px;left:10%;right:10%;height:1px;
      background:linear-gradient(90deg,transparent,rgba(167,139,250,.12),transparent);
    }
    .back{
      display:flex;align-items:center;gap:2px;
      font-size:14px;font-weight:500;
      color:rgba(167,139,250,.8);
      text-decoration:none;
      transition:opacity .15s;
    }
    .back:hover{opacity:.55;}
    .back svg{width:18px;height:18px;}

    /* ── MAIN ── */
    main{
      position:relative;z-index:1;
      padding-top:54px;
      min-height:100vh;
      display:flex;flex-direction:column;
    }

    @keyframes popIn{from{opacity:0;transform:scale(.88);}to{opacity:1;transform:scale(1);}}
    @keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

    /* ── UPPER ── */
    .upper{
      flex:0 0 auto;
      display:flex;flex-direction:column;align-items:center;
      padding:64px 24px 40px;
      text-align:center;
    }

    .ava-wrap{
      position:relative;
      width:96px;height:96px;
      margin-bottom:22px;
      animation:popIn .6s cubic-bezier(.22,1,.36,1) both;
    }
    .ava-ring{
      position:absolute;inset:-3px;
      border-radius:50%;
      background:conic-gradient(
        from 0deg,
        rgba(109,40,217,0) 0%,
        rgba(139,92,246,.9) 30%,
        rgba(96,165,250,.55) 50%,
        rgba(139,92,246,.9) 70%,
        rgba(109,40,217,0) 100%
      );
      animation:spin 6s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
    .ava-ring::before{
      content:'';
      position:absolute;inset:2px;
      border-radius:50%;
      background:#06050e;
    }
    .ava{
      position:absolute;inset:0;
      border-radius:50%;
      background:rgba(109,40,217,.5);
      backdrop-filter:blur(20px);
      border:1px solid rgba(139,92,246,.25);
      box-shadow:
        0 0 0 1px rgba(0,0,0,.3),
        inset 0 1.5px 0 rgba(255,255,255,.2),
        inset 0 -1.5px 4px rgba(0,0,0,.25),
        0 14px 40px rgba(76,29,149,.45);
      display:flex;align-items:center;justify-content:center;
      font-size:32px;font-weight:800;color:rgba(255,255,255,.9);
      letter-spacing:-1px;
    }

    .name{
      font-size:23px;font-weight:800;
      color:rgba(232,228,255,.9);
      letter-spacing:-0.6px;
      margin-bottom:4px;
      animation:slideUp .55s .1s cubic-bezier(.22,1,.36,1) both;
    }
    .handle{
      font-size:13px;
      color:rgba(232,228,255,.22);
      animation:slideUp .55s .15s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── NOW READING ── */
    .now-wrap{
      max-width:400px;width:calc(100% - 40px);align-self:center;
      margin:10px 0 8px;
      animation:slideUp .55s .28s cubic-bezier(.22,1,.36,1) both;
    }
    .nr{
      background:rgba(109,40,217,.1);
      backdrop-filter:blur(48px) saturate(200%);
      -webkit-backdrop-filter:blur(48px) saturate(200%);
      border:1px solid rgba(139,92,246,.2);
      border-radius:20px;
      padding:16px 18px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,.28),
        inset 0 1.5px 0 rgba(139,92,246,.18),
        inset 0 -1px 3px rgba(0,0,0,.2),
        0 8px 32px rgba(76,29,149,.2);
      display:flex;align-items:center;gap:14px;
      text-decoration:none;
      position:relative;overflow:hidden;
      cursor:pointer;
      transition:background .2s;
    }
    .nr:hover{background:rgba(109,40,217,.16);}
    .nr::before{
      content:'';
      position:absolute;top:0;left:15%;right:15%;height:1px;
      background:linear-gradient(90deg,transparent,rgba(139,92,246,.28),transparent);
    }
    .nr-cover{
      width:42px;height:60px;border-radius:8px;flex-shrink:0;
      background:linear-gradient(155deg,#09052a,#1a0f4e,#0a153e);
      box-shadow:0 6px 18px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);
      position:relative;overflow:hidden;
    }
    .nr-cover::before{
      content:'';position:absolute;
      width:46px;height:46px;border-radius:50%;
      background:rgba(139,92,246,.28);
      top:-14px;right:-14px;
    }
    .nr-cover::after{
      content:'';position:absolute;
      width:30px;height:2px;border-radius:1px;
      background:rgba(139,92,246,.4);
      bottom:16px;left:8px;
      box-shadow:0 6px 0 rgba(139,92,246,.25),0 12px 0 rgba(139,92,246,.15);
    }
    .nr-text{flex:1;}
    .nr-label{font-size:10px;font-weight:600;color:rgba(167,139,250,.65);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;}
    .nr-title{font-size:14px;font-weight:700;color:rgba(232,228,255,.88);}
    .nr-sub{font-size:11px;color:rgba(232,228,255,.28);margin-top:2px;}
    .nr-bar{margin-top:10px;height:2px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
    .nr-fill{height:100%;width:35%;background:linear-gradient(90deg,rgba(167,139,250,1),rgba(96,165,250,.8));border-radius:2px;box-shadow:0 0 8px rgba(109,40,217,.7);}
    .nr-arr{color:rgba(139,92,246,.4);}
    .nr-arr svg{width:15px;height:15px;display:block;}
    .nr-empty{
      font-size:13px;color:rgba(232,228,255,.25);
      text-align:center;padding:20px 18px;
    }

    /* ── SECTION BLOCKS ── */
    .sec-wrap{
      max-width:400px;width:calc(100% - 40px);align-self:center;
      margin:8px 0;
    }
    .sec-wrap:nth-child(5){animation:slideUp .55s .33s cubic-bezier(.22,1,.36,1) both;}
    .sec-wrap:nth-child(6){animation:slideUp .55s .39s cubic-bezier(.22,1,.36,1) both;}

    .sec-block{
      background:rgba(255,255,255,.026);
      backdrop-filter:blur(48px) saturate(180%);
      -webkit-backdrop-filter:blur(48px) saturate(180%);
      border:1px solid rgba(255,255,255,.07);
      border-radius:20px;
      overflow:hidden;
      box-shadow:
        0 0 0 1px rgba(0,0,0,.28),
        inset 0 1.5px 0 rgba(255,255,255,.11),
        inset 0 -1px 3px rgba(0,0,0,.18),
        0 6px 28px rgba(0,0,0,.38);
      position:relative;
    }
    .sec-block::before{
      content:'';
      position:absolute;top:0;left:18%;right:18%;height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
      z-index:1;
    }

    /* Section header row */
    .sec-head{
      display:flex;align-items:center;gap:12px;
      padding:14px 18px;
      cursor:pointer;
      transition:background .15s;
      position:relative;z-index:2;
      border:none;background:transparent;width:100%;
      text-align:left;font-family:inherit;
    }
    .sec-head:hover{background:rgba(255,255,255,.025);}
    .sec-icon{
      width:30px;height:30px;border-radius:9px;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.07);
    }
    .sec-icon svg{width:14px;height:14px;}
    .sec-label{flex:1;font-size:14px;font-weight:500;color:rgba(232,228,255,.72);}
    .sec-count{font-size:12px;color:rgba(232,228,255,.2);margin-right:4px;}
    .sec-chevron{transition:transform .25s cubic-bezier(.4,0,.2,1);}
    .sec-chevron svg{width:13px;height:13px;display:block;color:rgba(232,228,255,.16);}
    .sec-chevron.open{transform:rotate(90deg);}

    /* Collapsible content */
    .sec-body{
      max-height:0;overflow:hidden;
      transition:max-height .35s cubic-bezier(.4,0,.2,1);
    }
    .sec-body.open{max-height:600px;}
    .sec-divider{height:1px;background:rgba(255,255,255,.05);margin:0;}

    /* Favorites mini-grid */
    .fav-grid{
      display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
      padding:12px 14px 16px;
    }
    .fav-card{
      border-radius:12px;overflow:hidden;
      text-decoration:none;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.07);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 4px 12px rgba(0,0,0,.35);
      transition:transform .15s,box-shadow .15s;
      aspect-ratio:3/4;
      display:flex;flex-direction:column;
      position:relative;overflow:hidden;
    }
    .fav-card:hover{transform:translateY(-3px);box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 10px 24px rgba(0,0,0,.5);}
    .fav-card-img{
      flex:1;display:flex;align-items:center;justify-content:center;
      background:#fff;overflow:hidden;
    }
    .fav-card-img img{width:100%;height:100%;object-fit:contain;}
    .fav-card-num{
      font-size:9px;font-weight:700;color:rgba(232,228,255,.45);
      padding:5px 7px;letter-spacing:.04em;text-align:center;
      background:rgba(6,5,14,.6);
    }
    .sec-empty{
      padding:20px 18px;
      font-size:12px;color:rgba(232,228,255,.22);
      text-align:center;line-height:1.6;
      grid-column:1 / -1;
      justify-self:center;
      width:100%;
    }

    /* History list */
    .hist-list{padding:4px 0 8px;}
    .hist-item{
      display:flex;align-items:center;gap:11px;
      padding:9px 16px;
      text-decoration:none;
      color:rgba(232,228,255,.72);
      transition:background .15s;
    }
    .hist-item:hover{background:rgba(255,255,255,.025);}
    .hist-item+.hist-item{border-top:1px solid rgba(255,255,255,.04);}
    .hist-thumb{
      width:28px;height:28px;border-radius:6px;
      background:#fff;overflow:hidden;flex-shrink:0;
      border:1px solid rgba(255,255,255,.08);
    }
    .hist-thumb img{width:100%;height:100%;object-fit:contain;}
    .hist-info{flex:1;min-width:0;}
    .hist-title{font-size:12px;font-weight:600;color:rgba(232,228,255,.78);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .hist-num{font-size:10px;color:rgba(232,228,255,.25);margin-top:1px;}
    .hist-arr{color:rgba(232,228,255,.14);}
    .hist-arr svg{width:12px;height:12px;display:block;}

    /* ── ADMIN PANEL ── */
    .panels{
      display:flex;flex-direction:column;gap:8px;
      padding:0 20px 0;
      max-width:400px;width:100%;align-self:center;
      animation:slideUp .55s .44s cubic-bezier(.22,1,.36,1) both;
    }
    .panel{
      background:rgba(255,255,255,.026);
      backdrop-filter:blur(48px) saturate(180%);
      -webkit-backdrop-filter:blur(48px) saturate(180%);
      border:1px solid rgba(255,255,255,.07);
      border-radius:20px;
      overflow:hidden;
      box-shadow:
        0 0 0 1px rgba(0,0,0,.28),
        inset 0 1.5px 0 rgba(255,255,255,.11),
        inset 0 -1px 3px rgba(0,0,0,.18),
        0 6px 28px rgba(0,0,0,.38);
      position:relative;
    }
    .panel::before{
      content:'';
      position:absolute;top:0;left:18%;right:18%;height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
    }
    .row{
      display:flex;align-items:center;gap:14px;
      padding:14px 18px;
      text-decoration:none;
      color:rgba(232,228,255,.72);
      cursor:pointer;
      background:transparent;border:none;
      width:100%;text-align:left;font-family:inherit;
      transition:background .15s;
    }
    .row:hover{background:rgba(255,255,255,.025);}
    .ri{
      width:30px;height:30px;border-radius:9px;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.07);
    }
    .ri svg{width:14px;height:14px;}
    .rl{flex:1;font-size:14px;font-weight:500;}
    .ch svg{width:13px;height:13px;display:block;color:rgba(255,255,255,.16);}

    /* ── LOGOUT ── */
    .logout{
      max-width:400px;width:calc(100% - 40px);align-self:center;
      margin:16px 0 48px;
      animation:slideUp .55s .5s cubic-bezier(.22,1,.36,1) both;
    }
    .logout button{
      width:100%;padding:13px;
      background:rgba(239,68,68,.055);
      border:1px solid rgba(239,68,68,.12);
      border-radius:16px;
      font-size:14px;font-weight:600;
      font-family:inherit;color:rgba(239,68,68,.65);
      cursor:pointer;
      transition:background .15s,color .15s,border-color .15s;
    }
    .logout button:hover{
      background:rgba(239,68,68,.1);
      color:rgba(239,68,68,.9);
      border-color:rgba(239,68,68,.22);
    }
  </style>
</head>
<body>

<div class="scene">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
</div>

<header>
  <a class="back" href="/">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    Назад
  </a>
</header>

<main>
  <div class="upper">
    <div class="ava-wrap">
      <div class="ava-ring"></div>
      <div class="ava" id="avaLetter">А</div>
    </div>
    <p class="name" id="uName">Загрузка…</p>
    <p class="handle" id="uHandle">@—</p>
  </div>

  <!-- Now reading -->
  <div class="now-wrap">
    <a class="nr" href="#" id="nowLink">
      <div class="nr-cover" id="nowCover" style="display:none;"></div>
      <div class="nr-text" id="nowText">
        <p class="nr-empty">Нет активного чтения</p>
      </div>
    </a>
  </div>

  <!-- FAVORITES section -->
  <div class="sec-wrap">
    <div class="sec-block">
      <button class="sec-head" onclick="toggleSec('fav')">
        <div class="sec-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(244,114,182,.75)" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        </div>
        <span class="sec-label">Избранное</span>
        <span class="sec-count" id="favCount">0</span>
        <span class="sec-chevron" id="favChev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg></span>
      </button>
      <div class="sec-divider"></div>
      <div class="sec-body" id="favBody">
        <div class="fav-grid" id="favGrid">
          <div class="sec-empty">Нет избранных комиксов.<br>Нажмите 🔖 в читалке чтобы добавить.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Admin (shown only for admin role) -->
  <div class="panels" id="adminPanel" style="display:none;">
    <div class="panel">
      <a class="row" href="/admin">
        <div class="ri"><svg viewBox="0 0 24 24" fill="none" stroke="rgba(167,139,250,.75)" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>
        <span class="rl">Администратор</span>
        <span class="ch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg></span>
      </a>
    </div>
  </div>

  <div class="logout">
    <button onclick="doLogout()">Выйти</button>
  </div>
</main>

<script>
const API = '';

/* ── TOGGLE SECTIONS ── */
function toggleSec(key) {
  const body = document.getElementById(key + 'Body');
  const chev = document.getElementById(key + 'Chev');
  const open = body.classList.toggle('open');
  chev.classList.toggle('open', open);
}

function decodeJwt(token) {
  try {
    const raw = token.split('.')[1];
    const normalized = raw.replace(/-/g, '+').replace(/_/g, '/');
    const padded = normalized.padEnd(normalized.length + (4 - normalized.length % 4) % 4, '=');
    return JSON.parse(atob(padded));
  } catch {
    return {};
  }
}

function setUserInfo(username, email) {
  const safeName = username || 'Пользователь';
  document.getElementById('uName').textContent = safeName;
  document.getElementById('uHandle').textContent = email || '@' + safeName;
  document.getElementById('avaLetter').textContent = safeName[0].toUpperCase();
}

function setAdminPanel(role) {
  if (role === 'admin') {
    document.getElementById('adminPanel').style.display = 'block';
  }
}

function renderNoReading() {
  document.getElementById('nowLink').removeAttribute('href');
  document.getElementById('nowCover').style.display = 'none';
  document.getElementById('nowText').innerHTML = '<p class="nr-empty">Нет активного чтения</p>';
}

async function loadNowReading() {
  let hist = [];
  try {
    hist = JSON.parse(localStorage.getItem('history') || '[]');
  } catch {
    localStorage.removeItem('history');
  }

  while (hist.length > 0) {
    const last = hist[0];
    try {
      const r = await fetch(`${API}/api/comics/${last.id}`);
      if (!r.ok) throw new Error('not found');
      const comic = await r.json();
      const nowLink = document.getElementById('nowLink');
      nowLink.href = `/reader?id=${comic.ID}`;
      document.getElementById('nowCover').style.display = 'block';
      document.getElementById('nowText').innerHTML = `
        <p class="nr-label">Читаю сейчас</p>
        <p class="nr-title">xkcd #${comic.ID}</p>
        <p class="nr-sub">${comic.Title ? `«${comic.Title}»` : ''}</p>
        <div class="nr-bar"><div class="nr-fill"></div></div>
      `;
      return;
    } catch {
      hist.shift();
    }
  }

  localStorage.setItem('history', JSON.stringify(hist));
  renderNoReading();
}

/* ── LOAD PROFILE ── */
async function loadProfile() {
  const jwt = localStorage.getItem('jwt');
  if (!jwt) { location.href = '/login'; return; }
  const tokenData = decodeJwt(jwt);
  setUserInfo(tokenData.username, tokenData.email);
  setAdminPanel(tokenData.role);

  // Load profile + favorites from API in one call
  try {
    const r = await fetch(`${API}/api/me`, { headers: { Authorization: 'Bearer ' + jwt } });
    if (r.status === 401) { location.href = '/login'; return; }
    if (r.ok) {
      const data = await r.json();

      // User info from API response
      const username = data.username || tokenData.username;
      const email = data.email || tokenData.email;
      setUserInfo(username, email);

      // Show admin panel only for admins
      setAdminPanel(data.role || tokenData.role);

      // Favorites
      const favs = data.comics || [];
      const total = data.total ?? favs.length;
      document.getElementById('favCount').textContent = total;

      if (favs.length > 0) {
        const grid = document.getElementById('favGrid');
        grid.innerHTML = favs.slice(0, 12).map(c => `
          <a class="fav-card" href="/reader?id=${c.ID}">
            <div class="fav-card-img">
              ${c.URL ? `<img src="${c.URL}" alt="xkcd #${c.ID}" loading="lazy"/>` : `<div style="width:100%;height:100%;background:linear-gradient(155deg,#09052a,#1a0f4e);"></div>`}
            </div>
            <div class="fav-card-num">xkcd #${c.ID}</div>
          </a>`).join('');
      }
    }
  } catch {
    // Fallback: decode JWT for username if API unavailable
    setUserInfo(tokenData.username, tokenData.email);
    setAdminPanel(tokenData.role);
  }

  await loadNowReading();
}

function doLogout() {
  localStorage.removeItem('jwt');
  location.href = '/login';
}

loadProfile();
</script>
