services:

  api:
    image: api:latest
    build:
      context: search-services
      dockerfile: Dockerfile.api
    container_name: api
    restart: unless-stopped
    ports:
      - 28080:8080
    volumes:
      - ./search-services/api/config.yaml:/config.yaml
    environment:
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=password
      - JWT_SECRET=GOGOGOOOPHER
      - DB_ADDRESS=postgres://postgres:password@postgres:5432/postgres
      - TOKEN_TTL=24h
      - API_ADDRESS=:8080
      - WORDS_ADDRESS=words:8080
      - UPDATE_ADDRESS=update:8080
      - SEARCH_ADDRESS=search:8080
      - SEARCH_CONCURRENCY=10
      - SEARCH_RATE=100
    depends_on:
      - words
      - update
      - search

  words:
    image: words:latest
    build:
      context: search-services
      dockerfile: Dockerfile.words
    container_name: words
    restart: unless-stopped
    ports:
      - 28081:8080
    volumes:
      - ./search-services/words/config.yaml:/config.yaml
    environment:
      - WORDS_ADDRESS=:8080
      - MAX_SIZE_MSG=20000

  update:
    image: update:latest
    build:
      context: search-services
      dockerfile: Dockerfile.update
    container_name: update
    restart: unless-stopped
    ports:
      - 28082:8080
    volumes:
      - ./search-services/update/config.yaml:/config.yaml
    environment:
      - UPDATE_ADDRESS=:8080
      - DB_ADDRESS=postgres://postgres:password@postgres:5432/postgres
      - XKCD_URL=https://xkcd.com
      - XKCD_CONCURRENCY=50
      - WORDS_ADDRESS=words:8080
      - BROKER_ADDRESS=nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      words:
        condition: service_started
      nats:
        condition: service_started 

  search:
    image: search:latest
    build:
      context: search-services
      dockerfile: Dockerfile.search
    container_name: search
    restart: unless-stopped
    ports:
      - 28083:8080
    volumes:
      - ./search-services/search/config.yaml:/config.yaml
    environment:
      - DB_ADDRESS=postgres://postgres:password@postgres:5432/postgres
      - SEARCH_ADDRESS=:8080
      - WORDS_ADDRESS=words:8080
      - INDEX_TTL=24h
      - BROKER_ADDRESS=nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      words:
        condition: service_started 
      nats:
        condition: service_started 

  tests:
    image: tests:latest
    build: tests
    container_name: tests
    restart: "no"
    entrypoint: "true"

  postgres:
    image: postgres:18
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: password
    volumes:
      - postgres:/var/lib/postgresql
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4
    restart: unless-stopped
    ports:
      - "18888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@test.com
      PGADMIN_DEFAULT_PASSWORD: password
      PGADMIN_DISABLE_POSTFIX: "true"
    volumes:
      - pgadmin:/var/lib/pgadmin
    depends_on:
      - postgres

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.125.0
    container_name: victoriametrics
    ports:
      - 8428:8428
    volumes:
      - vmdata:/storage
      - ./metrics/promscrape.yml:/etc/promscrape.yml
    command:
      - "--storageDataPath=/storage"
      - "--httpListenAddr=:8428"
      - "--promscrape.config=/etc/promscrape.yml"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.2.0
    container_name: grafana
    depends_on:
      - "victoriametrics"
    ports:
      - 3000:3000
    volumes:
      - grafanadata:/var/lib/grafana
    restart: unless-stopped

  nats:
    image: nats
    container_name: nats
    ports:
      - "4222:4222"

  swagger:
    build:
      context: search-services
      dockerfile: Dockerfile.swagger
    container_name: swagger
    volumes:
      - ./search-services/api/docs:/go/api/docs

  front:
    image: nginx:latest
    container_name: front
    ports:
      - "2300:80"
    volumes:
      - ./search-services/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./search-services/frontend/src:/usr/share/nginx/html
    depends_on:
      - api

volumes:
  postgres:
  pgadmin:
  vmdata:
  grafanadata:
